; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; -------------------------------------------------------------------
; Configurations communes à toutes les cartes
; -------------------------------------------------------------------
[env]
framework = arduino
monitor_speed = 115200

; -------------------------------------------------------------------
; Configuration pour l'ESP32 WROOM (Classique)
; -------------------------------------------------------------------
[env:esp32_wroom]
platform = espressif32
board = esp32dev



; --- AJOUTEZ CES LIGNES POUR LES BIBLIOTHÈQUES ---
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit BusIO @ ^1.16.0

; --- Équivalent des options "Tools" de l'IDE Arduino ---

; 1. Mode de Flash (Équivalent de Tools -> Flash Mode)
; Le mode "dio" (Dual I/O) est le plus compatible et résout 90% des refus de boot
board_build.flash_mode = dio

; 2. Fréquence du Flash (Équivalent de Tools -> Flash Frequency)
board_build.f_flash = 40000000L ; Passez à 40MHz au lieu de 80MHz pour tester la stabilité

; 3. Fréquence du CPU (Équivalent de Tools -> CPU Frequency)
board_build.f_cpu = 240000000L

; 4. Schéma de partition (Équivalent de Tools -> Partition Scheme)
; Si votre binaire Forth ou votre application est volumineuse, la table par défaut sature.

board_build.partitions = huge_app.csv

; 5. Flags de débogage (Optionnel, pour voir ce qui cloche)
build_flags = 
    -D CORE_DEBUG_LEVEL=3 ; Active les messages d'erreur détaillés d'Espressif dans le moniteur 

; -------------------------------------------------------------------
; Configuration pour l'ESP32-S3
; -------------------------------------------------------------------
[env:esp32_s3]
platform = espressif32
board = esp32-s3-devkitc-1 ; À ajuster selon votre modèle exact de carte S3

; Options de build spécifiques au S3 (ex: activer le support USB natif ou les optimisations)
build_flags = 
    -D ESP32_S3_BOARD
    -D ARDUINO_USB_CDC_ON_BOOT=1 ; Permet d'avoir le terminal Forth sur l'USB natif du S3


